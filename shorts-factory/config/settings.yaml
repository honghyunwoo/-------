# Shorts Factory 설정

# 채널 설정
channels:
  stoic:
    name: "매일 스토아"
    language: "ko"
    tts_provider: "edge"  # 무료 Edge TTS 사용
    tts_voice_id: "ko-KR-InJoonNeural"  # 남성, 차분하고 신뢰감
    themes: ["philosophy", "motivation", "self-improvement"]

  english:
    name: "English Shorts"
    language: "en"
    tts_provider: "edge"  # 무료 Edge TTS 사용
    tts_voice_id: "en-US-GuyNeural"  # 남성
    themes: ["english", "learning", "expressions"]

# 영상 설정
video:
  width: 1080
  height: 1920
  fps: 30
  codec: "libx264"
  audio_codec: "aac"
  bitrate: "5M"

# 자막 설정
subtitle:
  font: "NotoSerifKR-Bold"
  fontsize: 48
  color: "white"
  highlight_color: "#D4AF37"
  stroke_color: "black"
  stroke_width: 2
  position: "bottom"
  bottom_margin: 320  # 화면 하단에서 자막까지의 여백 (1920 - 320 = 1600px)
  text_margin: 20     # 텍스트 상하 패딩 (stroke 짤림 방지)
  max_chars_per_line: 15
  wrap_width: 22      # 줄바꿈 문자 수

# BGM 설정
bgm:
  volume: 0.2
  fade_duration: 1.0

# 경로 설정
paths:
  assets: "./assets"
  templates: "./templates"
  output: "./output"
  fonts: "./assets/fonts"
  bgm: "./assets/bgm"
  broll: "./assets/b-roll"

# 파이프라인 설정
pipeline:
  review_min_score: 8.0
  review_max_iterations: 3
  default_hook_type: "H1"
  default_cta_type: "C3"

# Google Gemini API 설정
gemini:
  model: "gemini-3-flash-preview"
  max_tokens: 2000
  temperature: 0.7

# 로깅 설정
logging:
  level: "INFO"
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
  file: "./logs/shorts-factory.log"
