# ========================================
# 🦉 올빼미 AI 영상 스튜디오 - 설정 파일
# ========================================
# 이 파일을 복사해서 config.toml로 저장한 후 사용하세요
# 각 항목에 대한 설명이 한글로 되어 있습니다

[app]
# ----------------
# 📹 영상 소스 설정
# ----------------
# 영상 클립을 어디서 가져올지 선택 ("pexels" 또는 "pixabay")
video_source = "pexels"

# 설정 패널을 숨길지 여부 (웹 UI에서 설정을 숨기고 싶을 때 true로 설정)
hide_config = false

# Pexels API 키 (무료 영상 소스)
# https://www.pexels.com/api/ 에서 무료로 받을 수 있습니다
# 여러 개 설정하면 속도 제한을 피할 수 있어요
# 예시: pexels_api_keys = ["키1", "키2", "키3"]
pexels_api_keys = []

# Pixabay API 키 (무료 영상 소스)
# https://pixabay.com/api/docs/ 에서 무료로 받을 수 있습니다
# 여러 개 설정하면 속도 제한을 피할 수 있어요
pixabay_api_keys = []

# ----------------
# 📊 유튜브 트렌드 분석 (바이럴 기능)
# ----------------
# YouTube Data API v3 키 (선택사항, 없으면 기본 제안 사용)
# https://console.cloud.google.com/apis/credentials 에서 무료로 받을 수 있습니다
# 트렌딩 동영상 분석, 바이럴 키워드 추출, 최적 영상 길이 분석 등에 사용
youtube_api_key = ""

# ----------------
# 🤖 AI 모델 설정
# ----------------
# 스크립트 생성에 사용할 AI 제공업체 선택
# 사용 가능한 AI: openai, moonshot, deepseek, gemini, ollama, g4f, oneapi, azure, qwen, ernie, cloudflare, pollinations
llm_provider = "openai"

# === Pollinations AI (무료) ===
# https://pollinations.ai/ - 무료로 사용 가능한 AI
pollinations_api_key = ""
pollinations_base_url = "https://pollinations.ai/api/v1"
pollinations_model_name = "openai-fast"

# === Ollama (로컬 AI) ===
# 내 컴퓨터에서 AI를 직접 돌릴 때 사용
# https://ollama.com/library 에서 모델 확인
ollama_base_url = ""
ollama_model_name = ""

# === OpenAI (ChatGPT) ===
# https://platform.openai.com/api-keys 에서 키 발급
openai_api_key = ""
openai_base_url = ""
openai_model_name = "gpt-4o-mini"

# === Moonshot (한국/중국에서 사용하기 좋음) ===
# https://platform.moonshot.cn/console/api-keys
moonshot_api_key = ""
moonshot_base_url = "https://api.moonshot.cn/v1"
moonshot_model_name = "moonshot-v1-8k"

# === OneAPI (여러 AI를 한 번에 관리) ===
# https://github.com/songquanpeng/one-api
oneapi_api_key = ""
oneapi_base_url = ""
oneapi_model_name = ""

# === G4F (무료 GPT) ===
# https://github.com/xtekky/gpt4free
# 무료지만 안정성이 낮을 수 있어요
g4f_model_name = "gpt-3.5-turbo"

# === Azure OpenAI ===
# https://portal.azure.com 에서 설정
azure_api_key = ""
azure_base_url = ""
azure_model_name = "gpt-35-turbo"
azure_api_version = "2024-02-15-preview"

# === Google Gemini ===
# https://ai.google.dev/
gemini_api_key = ""
gemini_model_name = "gemini-1.0-pro"

# === Qwen (알리바바) ===
# https://dashscope.console.aliyun.com/apiKey
qwen_api_key = ""
qwen_model_name = "qwen-max"

# === DeepSeek (한국/중국에서 사용하기 좋음) ===
# https://platform.deepseek.com/api_keys
deepseek_api_key = ""
deepseek_base_url = "https://api.deepseek.com"
deepseek_model_name = "deepseek-chat"

# ----------------
# 🎬 자막 설정
# ----------------
# 자막 생성 방식 ("edge" = 빠름, "whisper" = 정확함)
# 빈 값으로 두면 자막이 생성되지 않습니다
subtitle_provider = "edge"

# ----------------
# 🛠️ 도구 경로 설정
# ----------------
# ImageMagick 경로 (자동 감지되지만 Windows에서는 수동 설정 필요할 수 있음)
# 다운로드: https://imagemagick.org/archive/binaries/
# 예시: imagemagick_path = "C:\\Program Files\\ImageMagick-7.1.1-Q16\\magick.exe"
# imagemagick_path = ""

# FFmpeg 경로 (보통 자동으로 다운로드되지만 문제 시 수동 설정)
# 다운로드: https://www.gyan.dev/ffmpeg/builds/
# 예시: ffmpeg_path = "C:\\Users\\내이름\\Downloads\\ffmpeg.exe"
# ffmpeg_path = ""

# ----------------
# 🌐 서버 설정
# ----------------
# 영상 다운로드 주소 (보통 자동 설정되지만, 도메인 사용 시 설정)
# 예시: endpoint = "https://내도메인.com"
endpoint = ""

# 영상 소재 저장 위치
# 빈 값: 기본 폴더 (./storage/cache_videos)
# 경로 지정: 원하는 폴더 (예: "/user/videos")
# "task": 작업별로 별도 폴더 (공유 안 됨)
material_directory = ""

# ----------------
# ⚙️ 시스템 설정
# ----------------
# Redis 사용 (여러 작업을 관리할 때 필요, 보통은 false로 두세요)
enable_redis = false
redis_host = "localhost"
redis_port = 6379
redis_db = 0
redis_password = ""

# 동시에 처리할 수 있는 영상 개수
max_concurrent_tasks = 5

# ----------------
# 🎤 Whisper 자막 설정
# ----------------
[whisper]
# subtitle_provider가 "whisper"일 때만 적용됩니다

# 모델 크기 (추천: "large-v3")
model_size = "large-v3"

# 실행 장치 ("cpu" 또는 "cuda" - GPU 있으면 cuda 추천)
device = "cpu"

# 계산 방식 ("int8" = CPU용, "float16" = GPU용)
compute_type = "int8"

# ----------------
# 🌍 프록시 설정
# ----------------
[proxy]
# Pexels API 접속에 프록시 사용이 필요한 경우
# 형식: "http://사용자:비밀번호@프록시주소:포트"
# 예시:
# http = "http://user:pass@proxy:1234"
# https = "http://user:pass@proxy:1234"

# ----------------
# 🔊 Azure 음성 설정
# ----------------
[azure]
# Azure 음성 API 키
# https://portal.azure.com 에서 발급
speech_key = ""
speech_region = ""

# ----------------
# 🎙️ SiliconFlow 음성 설정
# ----------------
[siliconflow]
# SiliconFlow API 키
# https://siliconflow.cn 에서 발급
api_key = ""

# ----------------
# 🖥️ UI 설정
# ----------------
[ui]
# 웹 UI에서 로그를 숨길지 여부
hide_log = false

# ----------------
# 🔐 데이터베이스 설정
# ----------------
[database]
# 사용자 데이터 저장용 데이터베이스 경로
db_path = "./storage/data.db"

# ----------------
# 🔒 인증 설정
# ----------------
[auth]
# JWT 인증 비밀키 (상용화 시 반드시 변경하세요!)
secret_key = "your-secret-key-here-change-in-production"

# 토큰 만료 시간 (분 단위)
access_token_expire_minutes = 30
