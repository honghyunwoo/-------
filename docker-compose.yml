# 🦉 올빼미 AI 영상 스튜디오 - Docker Compose Configuration
version: '3.8'

services:
  # FastAPI Backend
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: owl-studio-api
    ports:
      - "8080:8080"
    command: ["uvicorn", "app.asgi:app", "--host", "0.0.0.0", "--port", "8080", "--workers", "4"]
    environment:
      - APP_ENV=${APP_ENV:-production}
      - USE_SQLITE=${USE_SQLITE:-false}
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    env_file:
      - .env
    volumes:
      - ./storage:/app/storage
      - ./logs:/app/logs
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - owl-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Streamlit WebUI
  webui:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: owl-studio-webui
    ports:
      - "8501:8501"
    command: ["streamlit", "run", "./webui/Main.py", "--server.port=8501", "--server.address=0.0.0.0", "--server.enableCORS=true", "--browser.gatherUsageStats=false"]
    env_file:
      - .env
    volumes:
      - ./storage:/app/storage
    depends_on:
      - api
    restart: unless-stopped
    networks:
      - owl-network

  # PostgreSQL Database
  db:
    image: postgres:15-alpine
    container_name: owl-studio-db
    environment:
      POSTGRES_USER: ${DB_USER:-owl_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME:-owl_studio}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: unless-stopped
    networks:
      - owl-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-owl_user}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: owl-studio-redis
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-}
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    restart: unless-stopped
    networks:
      - owl-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  owl-network:
    driver: bridge